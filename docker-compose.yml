version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tongye
      POSTGRES_USER: tongye
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tongye}  # ⚠️ 生产环境必须修改
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tongye -d tongye"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://tongye:${DB_PASSWORD:-tongye}@db:5432/tongye
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in production}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required in production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    restart: unless-stopped

  # React 前端 (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
